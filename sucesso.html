<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Enviada | Dr. Julio Ligaboi</title>
    <style>
        /* Variáveis de Cor para manter o padrão */
        :root {
            --bg-deep: #0a192f;
            --accent-cyan: #00a6c0;
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--bg-deep);
            /* APLICANDO O SEU CÓDIGO DE FUNDO AQUI */
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 166, 192, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 40px);
            
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.03); 
            padding: 60px 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 166, 192, 0.2); /* Borda com o Turquesa do site */
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            max-width: 550px;
            width: 90%;
            backdrop-filter: blur(10px); /* Efeito vidro mais forte */
        }

        .icon {
            font-size: 70px;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            /* Brilho suave no ícone */
            text-shadow: 0 0 20px rgba(0, 166, 192, 0.5);
        }

        h1 { 
            font-size: 32px; 
            margin-bottom: 20px; 
            color: var(--text-main);
            letter-spacing: 1px;
        }

        p { 
            font-size: 18px; 
            color: var(--text-dim); 
            margin-bottom: 35px; 
            line-height: 1.7; 
        }

        .btn-voltar {
            display: inline-block;
            padding: 14px 35px;
            background-color: transparent;
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        .btn-voltar:hover {
            background-color: var(--accent-cyan);
            color: var(--bg-deep);
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 166, 192, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">✓</div>
        <h1>MENSAGEM ENVIADA</h1>
        <p>Recebemos seus dados com sucesso. O Dr. Julio Ligaboi entrará em contato em breve.</p>
        
        <a href="index.html" class="btn-voltar">Voltar para a Home</a>
    </div>

</body>
</html>
